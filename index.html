<!DOCTYPE html>
<html>
<head>
   <title>Plynk</title>
   <meta http-equiv="content-type" content="text/html; charset=utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <meta name="HandheldFriendly" content="true">
   <meta name="description" content="A simple link shortener that uses PasteBin servers.">
   <meta name="author" content="Plynk">
   <link rel="canonical" href="https://plynk.vercel.app/">

   <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="app/180.png">
   <link rel="icon" type="image/png" sizes="32x32" href="app/32.png">
   <link rel="icon" type="image/png" sizes="194x194" href="app/194.png">
   <link rel="icon" type="image/png" sizes="192x192" href="app/192.png">
   <link rel="icon" type="image/png" sizes="16x16" href="app/16.png">
   <link rel="image_src" type="image/png" sizes="256x256" href="app/256.png">
   <link rel="shortcut icon" type="image/x-icon" href="app/favicon.ico">
   <link rel="manifest" href="app/site.webmanifest">
   <link rel="mask-icon" href="app/safari.svg" color="#ec9918">
   <meta name="apple-mobile-web-app-title" content="Plynk">
   <meta name="application-name" content="Plynk">
   <meta name="theme-color" content="#14100b">
   <meta name="darkreader-lock">

   <link rel="stylesheet" type="text/css" href="styles/jetbrainsmono.min.css">
   <link rel="stylesheet" type="text/css" href="styles/main.css">
   <style rel="stylesheet" id="nightCSS"></style>
   <style rel="stylesheet" id="dayCSS"></style>

   <meta property="og:site_name" content="Plynk">
   <meta property="og:title" content="Plynk">
   <meta property="og:type" content="website">
   <meta property="og:url" content="https://plynk.vercel.app/">
   <meta property="og:image" content="https://plynk.vercel.app/app/ograph.png?20260522041716">
   <meta property="og:image:type" content="image/png">
   <meta property="og:image:width" content="1200">
   <meta property="og:image:height" content="630">
   <meta property="og:image:alt" content="Plynk Logo">
   <meta property="og:description" content="A simple link shortener that uses PasteBin servers.">

   <meta name="twitter:title" content="Plynk">
   <meta name="twitter:image" content="https://plynk.vercel.app/app/twitter.png?20260522041716">
   <meta name="twitter:card" content="summary_large_image">

   <!-- <script type="text/javascript" src="scripts/head.min.js"></script> -->
   <script type="text/javascript" src="scripts/theme.min.js"></script>
</head>
<body>
   <div class="content">
      <form>
         <a href="/" class="logo"><span>plynk</span><span>.vercel.app</span></a>
         <span class="subtitle">A PasteBin-backed URL Shortener</span>
         <div class="shorten">
            <span>~$</span>
            <input type="text" id="pasted_url" placeholder="paste a long url here..." required>
            <button class="output" type="qr">QR</button>
            <button class="output" type="copy">COPY</button>
            <button class="input" type="submit">&#62;__&#60;</button>
         </div>
         <div class="expires" data-selected="1D">
            <span>Expires</span>
            <div class="expires__options">
               <span data-value="10M">10 mins</span>
               <span data-value="1H">1 hour</span>
               <span data-value="1D">1 day</span>
               <span data-value="1W">1 week</span>
               <span data-value="2W">2 weeks</span>
               <span data-value="1M">1 month</span>
               <span data-value="6M">6 months</span>
               <span data-value="1Y">1 year</span>
               <span data-value="N">never</span>
            </div>
         </div>
         <a class="anew" href="/">Shorten another link</a>
      </form>
      <footer><a href="https://github.com/NaeemBolchhi/plynk">GitHub</a> | <a href="https://gitlab.com/NaeemBolchhi/plynk">GitLab</a> | <a href="https://mit-license.org/">MIT License</a></footer>
   </div>

   <script type="text/javascript" src="scripts/body.min.js"></script>
</body>
</html>
